plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'mx.uv.sigomei'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories { mavenCentral() }

javafx {
    version = '21.0.4'
    modules = ['javafx.controls', 'javafx.fxml']
}

application {
    mainClass = 'sigomei.cliente.ClienteMain'
}
